# Operating an Autonomous Vehicle
diagram:
  id: diag-operating-an-autonomous-vehicle
  name: Operating an Autonomous Vehicle
  type: sysml:UseCaseDiagram
  package: pkg-context
  elements:
    - elementId: blk-fleet-management-system
    - elementId: actor-safety-operator
    - elementId: actor-remote-operator
    - elementId: actor-passenger
    - elementId: actor-vehicle-drive-by-wire-system
    - elementId: blk-vehicle-drive-by-wire-system
  relationships:
    - assoc-blk-fleet-management-system-to-uc-drive-to-goal # blk-fleet-management-system → uc-drive-to-goal (Association)
    - assoc-blk-fleet-management-system-to-uc-monitor-vehicle # blk-fleet-management-system → uc-monitor-vehicle (Association)
    - assoc-actor-safety-operator-to-uc-drive-to-goal # actor-safety-operator → uc-drive-to-goal (Association)
    - assoc-actor-safety-operator-to-uc-manual-remote-drive # actor-safety-operator → uc-manual-remote-drive (Association)
    - assoc-actor-remote-operator-to-uc-manual-remote-drive # actor-remote-operator → uc-manual-remote-drive (Association)
    - assoc-actor-passenger-to-uc-manage-passengers # actor-passenger → uc-manage-passengers (Association)
    - assoc-blk-vehicle-drive-by-wire-system-to-uc-drive-to-goal # blk-vehicle-drive-by-wire-system → uc-drive-to-goal (Association)
    - assoc-blk-vehicle-drive-by-wire-system-to-uc-monitor-vehicle # blk-vehicle-drive-by-wire-system → uc-monitor-vehicle (Association)
    - inc-uc-drive-to-goal-to-uc-set-route # uc-drive-to-goal → uc-set-route (Include)
    - ext-uc-execute-mrm-to-uc-engage-autonomous-mode # uc-execute-mrm → uc-engage-autonomous-mode (Extend)
    - assoc-actor-passenger-to-uc-engage-autonomous-mode # actor-passenger → uc-engage-autonomous-mode (Association)
  subject:
    elementId: blk-autoware
    contains:
      - uc-drive-to-goal
      - uc-set-route
      - uc-initialize-pose
      - uc-engage-autonomous-mode
      - uc-execute-mrm
      - uc-monitor-vehicle
      - uc-manual-remote-drive
      - uc-manage-passengers
