# Developing and Testing Autoware
diagram:
  id: diag-developing-and-testing-autoware
  name: Developing and Testing Autoware
  type: uml:UseCaseDiagram
  package: pkg-context
  elements:
    - elementId: actor-ci-pipeline # CI Pipeline (Actor)
    - elementId: actor-developer # Developer (Actor)
    - elementId: actor-scenario-simulator # Scenario Simulator (Actor)
  relationships:
    - assoc-actor-ci-pipeline-to-uc-evaluate-components # CI Pipeline → Evaluate components (Association)
    - assoc-actor-ci-pipeline-to-uc-run-scenario-test # CI Pipeline → Run scenario test (Association)
    - assoc-actor-developer-to-uc-evaluate-components # Developer → Evaluate components (Association)
    - assoc-actor-developer-to-uc-replay-scenarios # Developer → Replay scenarios (Association)
    - assoc-actor-developer-to-uc-run-scenario-test # Developer → Run scenario test (Association)
    - assoc-actor-scenario-simulator-to-uc-run-scenario-test # Scenario Simulator → Run scenario test (Association)
    - inc-uc-replay-scenarios-to-uc-run-planning-simulation # Replay scenarios → Run planning simulation (Include)
  subject:
    elementId: blk-autoware
    contains:
      - uc-evaluate-components
      - uc-replay-scenarios
      - uc-run-planning-simulation
      - uc-run-scenario-test
