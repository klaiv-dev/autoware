blocks:
  - id: blk-autoware
    name: Autoware System
    type: sysml:Block
    package: pkg-system-architecture
    parts:
      - id: prt-vehicleinterface
        name: vehicleInterface
        typeRef: blk-vehicle-interface
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-vehicle-interface
      - id: prt-control
        name: control
        typeRef: blk-control
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-control
      - id: prt-sensing
        name: sensing
        typeRef: blk-sensing
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-sensing
      - id: prt-map
        name: map
        typeRef: blk-map
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-map
      - id: prt-localization
        name: localization
        typeRef: blk-localization
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-localization
      - id: prt-perception
        name: perception
        typeRef: blk-perception
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-perception
      - id: prt-planning
        name: planning
        typeRef: blk-planning
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-planning
      - id: prt-safetysystem
        name: safetySystem
        typeRef: blk-safety-system
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-safety-system
      - id: prt-adapi
        name: adApi
        typeRef: blk-ad-api
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-ad-api
    linkedDiagram: diag-autoware-internal-structure
  - {id: blk-fleet-management-system, name: Fleet Management System, type: "sysml:Block", package: pkg-context, stereotype: externalSystem}
  - {id: blk-vehicle-drive-by-wire-system, name: Vehicle Drive-by-Wire System, type: "sysml:Block", package: pkg-context, stereotype: system}
  - id: blk-sensing
    name: Sensing
    type: sysml:Block
    package: pkg-system-decomposition
    ports:
      - id: port-pointcloud
        name: pointCloud
        kind: proxy
        typeRef: ifblk-ipointcloud-2
  - id: blk-localization
    name: Localization
    type: sysml:Block
    package: pkg-system-decomposition
    ports:
      - id: port-pointcloud
        name: pointCloud
        kind: proxy
        isConjugated: true
        typeRef: ifblk-ipointcloud-2
      - id: port-kinematicstate
        name: kinematicState
        kind: proxy
        typeRef: ifblk-ikinematicstate
  - id: blk-perception
    name: Perception
    type: sysml:Block
    package: pkg-perception
    ports:
      - id: port-pointcloud
        name: pointCloud
        kind: proxy
        isConjugated: true
        typeRef: ifblk-ipointcloud-2
      - id: port-objects
        name: objects
        kind: proxy
        typeRef: ifblk-ipredictedobjects
    parts:
      - id: prt-detection
        name: detection
        typeRef: blk-detection
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-perception-to-blk-detection
      - id: prt-tracking
        name: tracking
        typeRef: blk-tracking
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-perception-to-blk-tracking
      - id: prt-prediction
        name: prediction
        typeRef: blk-prediction
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-perception-to-blk-prediction
      - id: prt-trafficlightrecongnition
        name: trafficLightRecongnition
        typeRef: blk-traffic-light-recongnition
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-perception-to-blk-traffic-light-recongnition
    linkedDiagram: diag-perception-internals
  - id: blk-planning
    name: Planning
    type: sysml:Block
    package: pkg-system-decomposition
    ports:
      - id: port-objects
        name: objects
        kind: proxy
        isConjugated: true
        typeRef: ifblk-ipredictedobjects
      - id: port-kinematicstate
        name: kinematicState
        kind: proxy
        isConjugated: true
        typeRef: ifblk-ikinematicstate
      - id: port-vectormap
        name: vectorMap
        kind: proxy
        isConjugated: true
        typeRef: ifblk-imap
      - id: port-trajectory
        name: trajectory
        kind: proxy
        typeRef: ifblk-itrajectory
  - id: blk-control
    name: Control
    type: sysml:Block
    package: pkg-system-decomposition
    ports:
      - id: port-trajectory
        name: trajectory
        kind: proxy
        isConjugated: true
        typeRef: ifblk-itrajectory
      - id: port-kinematicstate
        name: kinematicState
        kind: proxy
        isConjugated: true
        typeRef: ifblk-ikinematicstate
      - id: port-controlcmd
        name: controlCmd
        kind: proxy
        typeRef: ifblk-icontrolcmd
  - id: blk-vehicle-interface
    name: Vehicle Interface
    type: sysml:Block
    package: pkg-system-decomposition
    ports:
      - id: port-controlcmd
        name: controlCmd
        kind: proxy
        isConjugated: true
        typeRef: ifblk-icontrolcmd
  - id: blk-map
    name: Map
    type: sysml:Block
    package: pkg-system-decomposition
    ports:
      - id: port-map
        name: vectorMap
        kind: proxy
        typeRef: ifblk-imap
  - {id: blk-safety-system, name: Safety System, type: "sysml:Block", package: pkg-system-decomposition, stereotype: subsystem}
  - {id: blk-ad-api, name: AD API, type: "sysml:Block", package: pkg-system-decomposition, stereotype: subsystem}
  - id: blk-ego-vehicle
    name: Ego Vehicle
    type: sysml:Block
    package: pkg-system-decomposition
    parts:
      - id: prt-sensorkit
        name: sensorKit
        typeRef: blk-sensor-kit
        aggregation: shared
        relationshipId: aggr-blk-ego-vehicle-to-blk-sensor-kit
  - id: blk-sensor-kit
    name: Sensor Kit
    type: sysml:Block
    package: pkg-system-decomposition
    parts:
      - id: prt-lidar
        name: lidar
        typeRef: blk-lidar
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-sensor-kit-to-blk-lidar
      - id: prt-camera
        name: camera
        typeRef: blk-camera
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-sensor-kit-to-blk-camera
      - id: prt-gnss
        name: gnss
        typeRef: blk-gnss
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-sensor-kit-to-blk-gnss
      - id: prt-imu
        name: imu
        typeRef: blk-imu
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-sensor-kit-to-blk-imu
  - {id: blk-lidar, name: LIDAR, type: "sysml:Block", package: pkg-system-decomposition}
  - {id: blk-camera, name: Camera, type: "sysml:Block", package: pkg-system-decomposition}
  - {id: blk-gnss, name: GNSS, type: "sysml:Block", package: pkg-system-decomposition}
  - {id: blk-imu, name: IMU, type: "sysml:Block", package: pkg-system-decomposition}
  - {id: blk-vls-128, name: VLS-128, type: "sysml:Block", package: pkg-system-decomposition}
  - {id: blk-vlp-16, name: VLP-16, type: "sysml:Block", package: pkg-system-decomposition}
  - id: blk-trajectory
    name: Trajectory
    type: sysml:Block
    package: pkg-logical-interfaces
    attributes:
      - id: att-points
        name: points
        type: ""
        visibility: public
        typeRef: blk-trajectorypoint
    stereotype: logical
  - id: blk-trajectorypoint
    name: TrajectoryPoint
    type: sysml:Block
    package: pkg-logical-interfaces
    attributes:
      - id: att-x
        name: x
        type: ""
        visibility: public
        typeRef: vt-distance
      - id: att-y
        name: "y"
        type: ""
        visibility: public
        typeRef: vt-distance
      - id: att-heading
        name: heading
        type: ""
        visibility: public
        typeRef: vt-angle
      - id: att-longvel
        name: longitudinalVelocity
        type: ""
        visibility: public
        typeRef: vt-speed
      - id: att-acceleration
        name: acceleration
        type: ""
        visibility: public
        typeRef: vt-acceleration
      - id: att-headingrate
        name: headingRate
        type: ""
        visibility: public
        typeRef: vt-headingrate
    stereotype: logical
  - {id: blk-pointcloud, name: PointCloud, type: "sysml:Block", package: pkg-logical-interfaces, stereotype: logical}
  - id: blk-predictedpath
    name: PredictedPath
    type: sysml:Block
    package: pkg-logical-interfaces
    attributes:
      - id: att-conf
        name: confidence
        type: ""
        visibility: public
        typeRef: vt-confidence
    stereotype: logical
  - id: blk-predictedobject
    name: PredictedObject
    type: sysml:Block
    package: pkg-logical-interfaces
    attributes:
      - id: att-classif
        name: classification
        type: ""
        visibility: public
        typeRef: enum-objectclass
      - id: att-predpaths
        name: predictedPaths
        type: ""
        visibility: public
        typeRef: blk-predictedpath
    stereotype: logical
  - {id: blk-route, name: Route, type: "sysml:Block", package: pkg-logical-interfaces, stereotype: logical}
  - {id: blk-kinematicstate, name: KinematicState, type: "sysml:Block", package: pkg-logical-interfaces, stereotype: logical}
  - {id: blk-laneletmap, name: LaneletMap, type: "sysml:Block", package: pkg-logical-interfaces, stereotype: logical}
  - id: blk-detection
    name: Detection
    type: sysml:Block
    package: pkg-perception
    ports:
      - id: port-pointcloud
        name: pointCloud
        kind: proxy
        isConjugated: true
        typeRef: ifblk-ipointcloud-2
      - id: port-detection
        name: detection
        kind: proxy
        typeRef: ifblk-idetectedobjects
  - id: blk-tracking
    name: Tracking
    type: sysml:Block
    package: pkg-perception
    ports:
      - id: port-detectedobjects
        name: detectedObjects
        kind: proxy
        isConjugated: true
        typeRef: ifblk-idetectedobjects
      - id: port-trackedobjects
        name: trackedObjects
        kind: proxy
        typeRef: ifblk-itrackedobjects
  - id: blk-prediction
    name: Prediction
    type: sysml:Block
    package: pkg-perception
    ports:
      - id: port-trackedobjects
        name: trackedObjects
        kind: proxy
        isConjugated: true
        typeRef: ifblk-itrackedobjects
      - id: port-predictedobjects
        name: predictedObjects
        kind: proxy
        typeRef: ifblk-ipredictedobjects
  - {id: blk-traffic-light-recongnition, name: Traffic Light Recongnition, type: "sysml:Block", package: pkg-perception}
  - {id: blk-detectedobjects, name: DetectedObjects, type: "sysml:Block", package: pkg-logical-interfaces, stereotype: logical}
  - {id: blk-trackedobjects, name: TrackedObjects, type: "sysml:Block", package: pkg-logical-interfaces, stereotype: logical}
