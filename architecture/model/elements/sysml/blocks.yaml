      - id: prt-control
        name: control
        typeRef: blk-control
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-control
      - id: prt-sensing
        name: sensing
        typeRef: blk-sensing
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-sensing
      - id: prt-map
        name: map
        typeRef: blk-map
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-map
      - id: prt-localization
        name: localization
        typeRef: blk-localization
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-localization
      - id: prt-perception
        name: perception
        typeRef: blk-perception
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-perception
      - id: prt-planning
        name: planning
        typeRef: blk-planning
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-planning
      - id: prt-safetysystem
        name: safetySystem
        typeRef: blk-safety-system
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-safety-system
      - id: prt-adapi
        name: adApi
        typeRef: blk-ad-api
        multiplicity: "1"
        aggregation: composite
        relationshipId: compos-blk-autoware-to-blk-ad-api
  - {id: blk-fleet-management-system, name: Fleet Management System, type: "sysml:Block", package: pkg-context, stereotype: externalSystem}
  - {id: blk-vehicle-drive-by-wire-system, name: Vehicle Drive-by-Wire System, type: "sysml:Block", package: pkg-context, stereotype: system}
  - {id: blk-sensing, name: Sensing, type: "sysml:Block", package: pkg-system-decomposition, stereotype: subsystem}
  - {id: blk-localization, name: Localization, type: "sysml:Block", package: pkg-system-decomposition, stereotype: subsystem}
  - {id: blk-perception, name: Perception, type: "sysml:Block", package: pkg-system-decomposition, stereotype: subsystem}
  - {id: blk-planning, name: Planning, type: "sysml:Block", package: pkg-system-decomposition, stereotype: subsystem}
  - {id: blk-control, name: Control, type: "sysml:Block", package: pkg-system-decomposition, stereotype: subsystem}
  - {id: blk-vehicle-interface, name: Vehicle Interface, type: "sysml:Block", package: pkg-system-decomposition, stereotype: subsystem}
  - {id: blk-map, name: Map, type: "sysml:Block", package: pkg-system-decomposition, stereotype: subsystem}
